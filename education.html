  <script src="https://cdn.tailwindcss.com"></script>

  <link

  />

  <style>
    body { transition: background-color 250ms ease, color 250ms ease; }
  </style>
</head>

<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100">

  <!-- Top Bar -->
  <div class="w-full bg-gray-100 dark:bg-gray-900">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-4 text-xl">
        <a
          href="https://www.linkedin.com/in/ramel-dawood-4436b6298/"
          target="_blank"
          rel="noopener noreferrer"
          class="transition transform hover:scale-110 text-gray-700 dark:text-gray-200 hover:text-blue-600 dark:hover:text-blue-400"
          aria-label="LinkedIn"
          title="LinkedIn"
        ><i class="fa-brands fa-linkedin"></i></a>

        <a
          href="https://github.com/rameldawood2025"
          target="_blank"
          rel="noopener noreferrer"
          class="transition transform hover:scale-110 text-gray-700 dark:text-gray-200 hover:text-blue-600 dark:hover:text-blue-400"
          aria-label="GitHub"
          title="GitHub"
        ><i class="fa-brands fa-github"></i></a>
      </div>

      <button
        onclick="toggleDarkMode()"
        class="text-sm px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-md bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 shadow-sm"
      >
        <i class="fa-solid fa-moon mr-2 text-yellow-500"></i>Toggle Dark Mode
      </button>
    </div>
  </div>

  <!-- Header (Nav Only) -->
<header class="bg-white dark:bg-gray-800 shadow-sm">
  <div class="max-w-6xl mx-auto px-4 py-6 text-center">
    <nav class="flex flex-wrap justify-center gap-x-6 gap-y-2 text-sm md:text-base">
      <a href="index.html" class="text-blue-600 dark:text-blue-400 hover:underline">Home</a>
      <a href="skills.html" class="text-blue-600 dark:text-blue-400 hover:underline">Skills</a>
      <a href="projects.html" class="text-blue-600 dark:text-blue-400 hover:underline">Projects</a>
      <a href="experience.html" class="text-blue-600 dark:text-blue-400 hover:underline">Experience</a>
      <a href="education.html" class="text-blue-600 dark:text-blue-400 hover:underline">Education</a>
      <a href="certifications.html" class="text-blue-600 dark:text-blue-400 hover:underline font-semibold">Certifications</a>
      <a
        href="https://drive.google.com/file/d/1BsbBWeP8SUrhlWOQ009HY04sB8905HKh/view?usp=sharing"
        target="_blank"
        rel="noopener noreferrer"
        class="text-blue-600 dark:text-blue-400 hover:underline"
      >Resume (PDF)</a>
      <a href="contact.html" class="text-blue-600 dark:text-blue-400 hover:underline">Contact</a>
    </nav>
  </div>
</header>

  <!-- Education Content -->
  <section class="bg-gray-100 dark:bg-gray-900">
    <div class="max-w-6xl mx-auto px-4 py-14">
      <h2 class="text-3xl md:text-4xl font-extrabold text-center mb-10">Education</h2>

      <div class="max-w-4xl mx-auto">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 p-8">
          <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-3">
            <div>
              <h3 class="text-xl md:text-2xl font-bold">DePaul University</h3>
              <p class="italic text-gray-600 dark:text-gray-300">Bachelor of Science in Computer Science</p>
            </div>
            <div class="md:text-right text-gray-700 dark:text-gray-200">
              <p class="font-semibold">September 2021 – June 2025</p>
              <p class="italic text-gray-600 dark:text-gray-300">Chicago, IL</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>

  <script>
    function applySavedTheme() {
      const html = document.getElementById("htmlRoot");
      if (localStorage.getItem("theme") === "dark") html.classList.add("dark");
    }
    function toggleDarkMode() {
      const html = document.getElementById("htmlRoot");
      html.classList.toggle("dark");
      localStorage.setItem("theme", html.classList.contains("dark") ? "dark" : "light");
    }
    window.onload = applySavedTheme;
  </script>

</body>
</html>
